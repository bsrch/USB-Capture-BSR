<!doctype html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<!-- Prevent Safari caching -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Capture Viewer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header id="controls">

<div class="row">
<label>Device</label>
<select id="deviceSelect"></select>
</div>

<div class="row">
<label>Resolution</label>
<select id="resolutionSelect">
<option value="640x480">640×480</option>
<option value="1280x720">1280×720</option>
<option value="1600x900" selected>1600×900</option>
<option value="1920x1080">1920×1080</option>
</select>
</div>

<div class="row">
<label>Display Mode</label>
<select id="displayMode">
<option value="smart">Smart</option>
<option value="fit">Fit</option>
<option value="fill">Fill</option>
<option value="stretch">Stretch</option>
<option value="original">Original</option>
</select>
</div>

<div class="row">
<label>Zoom</label>
<input id="zoomSlider" type="range" min="0.5" max="2" step="0.01" value="1">
</div>

<div class="row actions">
<button id="startBtn">Start</button>
<button id="resetViewBtn">Reset</button>
<button id="fullscreenBtn">Fullscreen</button>
<button id="screenshotBtn">Screenshot</button>
</div>

</header>

<main id="viewer">
<video id="video" autoplay playsinline muted></video>
</main>

<canvas id="captureCanvas"></canvas>

<!-- Versioned JS to force refresh -->
<script src="app.js?v=1"></script>

</body>
</html>
