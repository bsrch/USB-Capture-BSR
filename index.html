<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>USB Capture — Auto Fill Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="controls">
      <select id="deviceSelect" title="Select video input"></select>

      <select id="resolutionSelect" title="Select capture resolution">
        <option value="640x480">640 × 480</option>
        <option value="1280x720" selected>1280 × 720</option>
        <option value="1600x900">1600 × 900</option>
        <option value="1920x1080">1920 × 1080</option>
      </select>

      <select id="fpsSelect" title="Select FPS">
        <option value="30" selected>30 FPS</option>
        <option value="60">60 FPS</option>
      </select>

      <button id="startBtn">Start</button>
      <button id="fullscreenBtn" title="F">Fullscreen</button>
      <button id="mirrorBtn" title="M">Mirror</button>
      <button id="pipBtn" title="P">PiP</button>
      <button id="screenshotBtn" title="S">Screenshot</button>
      <button id="resetViewBtn" title="R">Reset View</button>

      <span id="status" aria-live="polite"></span>
    </div>

    <div id="viewer">
      <!-- video is absolutely positioned and manually sized so it always COVERS viewer area -->
      <video id="video" autoplay playsinline muted></video>

      <div id="topBar">
        <button id="exitFullscreen">Exit</button>
      </div>
    </div>

    <!-- hidden canvas for screenshots -->
    <canvas id="captureCanvas" style="display:none"></canvas>
  </div>

  <script src="app.js"></script>
</body>
</html>
