<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>USB Capture — Perfect Fit Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="controls">
      <div class="row">
        <label for="deviceSelect">Video device</label>
        <select id="deviceSelect" aria-label="Video device"></select>
      </div>

      <div class="row">
        <label for="resolutionSelect">Resolution</label>
        <select id="resolutionSelect" aria-label="Resolution">
          <option value="640x480">640 × 480</option>
          <option value="1280x720">1280 × 720</option>
          <option value="1600x900" selected>1600 × 900</option>
          <option value="1920x1080">1920 × 1080</option>
        </select>
      </div>

      <div class="row">
        <label for="fpsSelect">FPS</label>
        <select id="fpsSelect" aria-label="Frames per second">
          <option value="30" selected>30 FPS</option>
          <option value="60">60 FPS</option>
        </select>
      </div>

      <div class="row">
        <label for="displayMode">Display mode</label>
        <select id="displayMode" aria-label="Display mode">
          <option value="smart" selected>Smart (auto)</option>
          <option value="fill">Fill (cover, crop)</option>
          <option value="fit">Fit (contain, bars possible)</option>
          <option value="stretch">Stretch (distort)</option>
          <option value="original">Original (native size)</option>
        </select>
      </div>

      <div class="row actions">
        <button id="startBtn">Start</button>
        <button id="fullscreenBtn" title="F">Fullscreen</button>
        <button id="mirrorBtn" title="M">Mirror</button>
        <button id="pipBtn" title="P">PiP</button>
        <button id="screenshotBtn" title="S">Screenshot</button>
        <button id="resetViewBtn" title="R">Reset</button>
      </div>

      <div class="row status" id="status" aria-live="polite"></div>
    </header>

    <main id="viewer">
      <video id="video" autoplay playsinline muted></video>
      <div id="topBar"><button id="exitFullscreen">Exit</button></div>
    </main>

    <canvas id="captureCanvas" style="display:none"></canvas>
  </div>

  <script src="app.js"></script>
</body>
</html>
